  <circle cx="452" cy="450" r="12" fill="#84bd2a" opacity="0.62"/>
  <circle cx="498" cy="445" r="10" fill="#84bd2a" opacity="0.52"/>
  <circle cx="540" cy="442" r="8"  fill="#84bd2a" opacity="0.43"/>
  <circle cx="578" cy="439" r="6.5" fill="#84bd2a" opacity="0.36"/>
  <circle cx="612" cy="437" r="5.5" fill="#84bd2a" opacity="0.30"/>

