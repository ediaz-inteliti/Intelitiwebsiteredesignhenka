  <!-- Dorsal crest / fin -->
  <path d="M 1018,345 C 1028,295 1044,305 1048,344 Z" fill="#0c344d"/>
  <path d="M 1022,347 C 1034,290 1052,308 1055,346 Z" fill="#082a40" opacity="0.85"/>

  <!-- ═══ EYE ═══ -->
  <!-- Outer scleral ring -->
  <circle cx="1086" cy="410" r="44" fill="#0c6080"/>
  <!-- Iris -->
  <circle cx="1086" cy="410" r="34" fill="#082840"/>
  <!-- Primary catchlight -->
  <circle cx="1100" cy="398" r="13" fill="#c8ecf8"/>
  <!-- Secondary catchlight -->
  <circle cx="1094" cy="406" r="5.5" fill="#e4f6fc" opacity="0.65"/>

  <!-- Smile crease -->
  <path d="M 1012,480 C 1026,492 1050,494 1070,486"
    stroke="#082840" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- ═══ LEGS ═══ -->

  <!-- Front leg -->
  <path d="M 332,568 L 320,615 C 316,622 322,626 330,624 C 336,626 342,622 338,615 C 342,622 348,626 354,624 C 362,622 364,615 358,608 L 352,568 Z"
